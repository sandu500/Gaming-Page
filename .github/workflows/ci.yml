name: CI
# Maintained by wimukthimadhavi55-afk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Checkout the repository code
    - uses: actions/checkout@v4
    # Validate the project structure
    - name: Validation
      run: |
        # Step 1: Check if core HTML exists
        test -f src/index.html
        # Step 2: Check if styles are present
        test -f src/styles/style.css
        # Step 3: Check if main script is present
        test -f src/scripts/script.js
